    <!-- Sole -->
    <ellipse cx="16" cy="22" rx="11" ry="3.5" fill="white" opacity="0.9"/>
    <!-- Upper body of chappal -->
    <path d="M7 21 Q8 15 13 14 Q16 13.5 18 15 Q21 17 24 16 Q26 15.5 25 18 Q23 20 20 21 Z" fill="white"/>
    <!-- Strap 1 -->
    <path d="M11 20 Q12 16.5 14 15.5" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
    <!-- Strap 2 -->
    <path d="M15 20.5 Q16 17 17.5 15.8" stroke="white" stroke-width="1.8" fill="none" stroke-linecap="round" opacity="0.7"/>
  </g>
